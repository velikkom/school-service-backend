# ==================================================
# APPLICATION
# ==================================================
spring.application.name=school-service-backend
server.port=8080

# ==================================================
# DATABASE - POSTGRESQL
# ==================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/school_service
spring.datasource.username=admin
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================================================
# JPA / HIBERNATE
# ==================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==================================================
# JACKSON (JSON)
# ==================================================
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=UTC

# ==================================================
# JWT CONFIG
# ==================================================
app.jwt.secret=ALmErUnR0PrfEjgVbeIs+9hPE+KIQ2k0MrWAy//pEH4MIpKqvTfJ03pcJ23r18DpQm6g2NyYhnG15RkJrV3g==
app.jwt.expiration-ms=86400000

# ==================================================
# LOGGING
# ==================================================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
